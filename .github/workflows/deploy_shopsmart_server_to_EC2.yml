name: Deploy Campus Bites to AWS EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-shopsmart
  cancel-in-progress: true

jobs:
  pr-check:
    name: PR check (build)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: shopsmart/server/package-lock.json

      - name: Install server dependencies
        run: npm ci --include=dev
        working-directory: shopsmart/server

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: shopsmart/server

      - name: Build server
        run: npm run build --if-present
        working-directory: shopsmart/server

      - name: Install client dependencies
        run: npm ci
        working-directory: shopsmart/client

      - name: Build client
        run: npm run build --if-present
        working-directory: shopsmart/client

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Deploy + restart (SSH)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          SHOPSMART_DEPLOY_PATH: ${{ secrets.SHOPSMART_DEPLOY_PATH || '/opt/shopsmart' }}
          SHOPSMART_SERVER_ENV: ${{ secrets.SHOPSMART_SERVER_ENV }}
        run: |
          DEPLOY_PATH="${SHOPSMART_DEPLOY_PATH:-/opt/shopsmart}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          BRANCH="${GITHUB_REF_NAME}"

          if [ -z "${SHOPSMART_SERVER_ENV:-}" ]; then
            echo "[ERROR] Missing secret SHOPSMART_SERVER_ENV (server .env contents)."
            # Continue anyway or exit 1; using exit 1 based on previous format
            exit 1
          fi

          # Copy backend env as a file (safe for multiline secrets)
          printf "%s" "$SHOPSMART_SERVER_ENV" > /tmp/shopsmart-server.env
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem /tmp/shopsmart-server.env "$EC2_USER@$EC2_HOST:/tmp/shopsmart-server.env"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            "$EC2_USER@$EC2_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' BRANCH='$BRANCH' bash -s" <<'EOF'
          set -euo pipefail

          # Ensure base tools exist
          if ! command -v git >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y git
          fi

          # Ensure Node + npm exist (Node 20 LTS)
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi

          # Ensure pm2 exists for process management (idempotent)
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          sudo mkdir -p "$DEPLOY_PATH"
          sudo chown -R "$USER":"$USER" "$DEPLOY_PATH"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            git clone "$REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          # Install env file that was copied via scp
          if [ -f /tmp/shopsmart-server.env ]; then
            install -m 600 /tmp/shopsmart-server.env shopsmart/server/.env
          fi

          # ----- Server Setup -----
          cd shopsmart/server
          npm ci --include=dev
          npx prisma generate
          npx prisma migrate deploy
          npm run build --if-present

          # Start or reload backend with pm2
          pm2 start dist/src/server.js --name shopsmart-api --update-env || pm2 restart shopsmart-api --update-env
          
          cd ../..

          # ----- Client Setup -----
          cd shopsmart/client
          npm ci
          npm run build
          
          # Start or reload client with pm2 (if served via node/next, else adjust accordingly)
          pm2 start npm --name shopsmart-client -- start || pm2 restart shopsmart-client

          pm2 save

          echo "[OK] Deployed ShopSmart monorepo."
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ec2_key.pem
