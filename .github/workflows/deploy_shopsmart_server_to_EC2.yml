name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            echo "=== Campus Bites Deployment ==="
            echo "Timestamp: $(date)"

            # Idempotent: create dir if it doesn't exist
            mkdir -p /home/ubuntu/campus-bites

            cd /home/ubuntu/campus-bites

            # Pull latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

            # Ensure Node.js + npm are available (some EC2 AMIs may not include them by default)
            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              echo "Node.js not found; installing Node.js 20.x"
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get update
              sudo apt-get install -y nodejs
            fi

            # Ensure pm2 is installed globally (used to manage services)
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            # Backend setup (idempotent)
            cd backend

            # If provided, write a .env file from a GitHub secret called ENV_FILE.
            # This is useful when the server requires environment variables but does not
            # have them stored in the repo.
            if [ -n "${{ secrets.ENV_FILE }}" ]; then
              echo "Writing .env from ENV_FILE secret"
              printf '%s' "${{ secrets.ENV_FILE }}" > .env
            fi

            npm ci --omit=dev
            npx prisma migrate deploy
            pm2 describe campus-bites-backend > /dev/null 2>&1 \
              && pm2 restart campus-bites-backend \
              || pm2 start server.js --name campus-bites-backend

            # Frontend setup (idempotent)
            cd ../frontend
            npm ci
            npm run build
            pm2 describe campus-bites-frontend > /dev/null 2>&1 \
              && pm2 restart campus-bites-frontend \
              || pm2 start npm --name campus-bites-frontend -- start

            pm2 save
            echo "=== Deployment complete ==="