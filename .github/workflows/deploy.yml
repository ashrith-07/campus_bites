name: Deploy Campus Bites to AWS EC2

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: deploy-campus-bites
  cancel-in-progress: true

jobs:
  pr-check:
    name: PR check (build)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---- Backend ----
      - name: Install backend deps
        run: npm ci --include=dev
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Build backend
        run: npm run build --if-present
        working-directory: backend

      # ---- Frontend ----
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build --if-present
        working-directory: frontend


  deploy:
    name: Deploy to EC2
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Setup SSH ----
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      # ---- Deploy ----
      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          DEPLOY_PATH: ${{ secrets.CAMPUS_BITES_DEPLOY_PATH || '/opt/campus-bites' }}
          SERVER_ENV: ${{ secrets.CAMPUS_BITES_SERVER_ENV }}
        run: |
          if [ -z "${SERVER_ENV:-}" ]; then
            echo "[ERROR] Missing CAMPUS_BITES_SERVER_ENV"
            exit 1
          fi

          printf "%s" "$SERVER_ENV" > /tmp/server.env

          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem /tmp/server.env "$EC2_USER@$EC2_HOST:/tmp/server.env"

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          BRANCH="${GITHUB_REF_NAME}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "$EC2_USER@$EC2_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' BRANCH='$BRANCH' bash -s" << 'EOF'
          set -e

          DEPLOY_PATH="${DEPLOY_PATH:-/opt/campus-bites}"

          echo "🚀 Starting deployment..."

          # ---- Install dependencies ----
          sudo apt-get update -y

          if ! command -v git >/dev/null; then
            sudo apt-get install -y git
          fi

          if ! command -v node >/dev/null; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi

          if ! command -v pm2 >/dev/null; then
            sudo npm install -g pm2
          fi

          # ---- Setup project ----
          sudo mkdir -p "$DEPLOY_PATH"
          sudo chown -R $USER:$USER "$DEPLOY_PATH"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            git clone "$REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"

          git fetch --all
          git reset --hard origin/$BRANCH

          # ---- ENV ----
          if [ -f /tmp/server.env ]; then
            install -m 600 /tmp/server.env backend/.env
            install -m 600 /tmp/server.env frontend/.env
          fi

          # ============================
          # BACKEND
          # ============================
          echo "⚙️ Setting up backend..."

          cd backend

          npm ci --include=dev
          npx prisma generate
          npx prisma migrate deploy
          npm run build

          # Restart backend safely
          pm2 delete campus-bites-api || true
          pm2 start server.js --name campus-bites-api

          cd ..

          # ============================
          # FRONTEND
          # ============================
          echo "⚙️ Setting up frontend..."

          cd frontend

          npm ci
          npm run build

          # Restart frontend safely
          pm2 delete campus-bites-client || true
          pm2 start npm --name campus-bites-client -- start -- -p 3000 -H 0.0.0.0

          cd ..

          # ---- Save PM2 ----
          pm2 save

          echo "✅ Deployment successful!"
          pm2 list

          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ec2_key.pem