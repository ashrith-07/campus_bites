name: Deploy Backend to AWS EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend checks (lint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

  deploy:
    name: Deploy backend to EC2
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          DEPLOY_PATH: ${{ secrets.CAMPUS_BITES_DEPLOY_PATH || '/opt/campus-bites' }}
          BACKEND_ENV: ${{ secrets.CAMPUS_BITES_SERVER_ENV }}
          FRONTEND_ENV: ${{ secrets.CAMPUS_BITES_CLIENT_ENV }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST:-}" ]; then
            echo "[ERROR] Missing secret: EC2_HOST"
            exit 1
          fi

          if [ -z "${EC2_USER:-}" ]; then
            echo "[ERROR] Missing secret: EC2_USER (or set default user)"
            exit 1
          fi

          if [ -z "${BACKEND_ENV:-}" ]; then
            echo "[ERROR] Missing secret: CAMPUS_BITES_SERVER_ENV (backend .env contents)"
            exit 1
          fi

          if [ -z "${FRONTEND_ENV:-}" ]; then
            echo "[WARNING] Missing secret: CAMPUS_BITES_CLIENT_ENV (frontend .env.local contents). Skipping frontend env."
          fi

          printf "%s" "$BACKEND_ENV" > /tmp/backend.env
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa /tmp/backend.env "$EC2_USER@$EC2_HOST:/tmp/backend.env"

          if [ -n "${FRONTEND_ENV:-}" ]; then
            printf "%s" "$FRONTEND_ENV" > /tmp/frontend.env
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa /tmp/frontend.env "$EC2_USER@$EC2_HOST:/tmp/frontend.env"
          fi

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          BRANCH="${GITHUB_REF_NAME}"

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa "$EC2_USER@$EC2_HOST" << EOF
          set -euo pipefail

          DEPLOY_PATH="${DEPLOY_PATH:-/opt/campus-bites}"
          REPO_URL="${REPO_URL}"
          BRANCH="${BRANCH}"

          sudo apt-get update -y
          sudo apt-get install -y git ca-certificates curl docker.io docker-compose-v2

          REMOTE_USER="\$(id -un)"
          sudo usermod -aG docker "\$REMOTE_USER" || true

          sudo mkdir -p "\$DEPLOY_PATH"
          sudo chown -R "\$REMOTE_USER:\$REMOTE_USER" "\$DEPLOY_PATH"

          if [ ! -d "\$DEPLOY_PATH/.git" ]; then
            git clone "\$REPO_URL" "\$DEPLOY_PATH"
          fi

          cd "\$DEPLOY_PATH"
          git fetch --all --prune
          git reset --hard "origin/\$BRANCH"

          if [ -f /tmp/backend.env ]; then
            install -m 600 /tmp/backend.env backend/.env
          fi

          if [ -f /tmp/frontend.env ]; then
            install -m 600 /tmp/frontend.env frontend/.env.local
          fi

          if command -v pm2 >/dev/null; then
            pm2 stop campus-bites-api || true
            pm2 delete campus-bites-api || true
            pm2 save || true
          fi

          sudo docker compose up -d --build

          echo "Running Prisma migrations..."
          sudo docker compose exec -T backend npx prisma migrate deploy

          echo "✅ Deployment done"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa

