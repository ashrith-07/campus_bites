name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # BACKEND – lint · unit tests · integration
  # ─────────────────────────────────────────
  backend:
    name: Backend (Node / Express)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --testPathPattern="unit" --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://test:test@localhost:3306/test' }}

      - name: Run integration tests
        run: npm test -- --testPathPattern="integration" --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://test:test@localhost:3306/test' }}

  # ─────────────────────────────────────────
  # FRONTEND – lint · unit tests · build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --watchAll=false
        env:
          NODE_ENV: test

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://campus-bites-server.vercel.app/api

  # ─────────────────────────────────────────
  # E2E (runs only when both jobs pass)
  # ─────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (local build)
        working-directory: frontend
        run: npx playwright test
        env:
          # Force Playwright to start the local dev server (webServer in playwright.config)
          CI: false
          # Run against the local Next.js server instead of the deployed site
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # Still use the deployed API so auth flows work without needing a local backend
          NEXT_PUBLIC_API_URL: https://campus-bites-server.vercel.app/api
